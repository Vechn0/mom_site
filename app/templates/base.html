<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Шрифт "мел" -->
    <link href="https://fonts.googleapis.com/css2?family=Neucha&display=swap" rel="stylesheet">

    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Neucha', cursive;
            background-color: #f8f9fa;
        }

        main {
            flex: 1;
        }

        .chalkboard {
            background-color: #2e4d3a;
            color: #f1f1f1;
        }

        .chalk-text {
            letter-spacing: 1px;
        }

        .brand-title {
            font-size: 1.1rem;
        }

        .brand-sub {
            font-size: 0.75rem;
            opacity: 0.8;
        }

        footer {
            font-size: 0.9rem;
        }

        footer p {
            margin-bottom: 5px;
        }

        footer a {
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>
<body>

<!-- HEADER -->
<nav class="navbar navbar-expand-lg chalkboard shadow-sm">
    <div class="container-fluid px-4">

        <div class="chalk-text">
            <div class="brand-title">
                👩‍🏫 Учитель — Федосеева Елена Андреевна
            </div>
            <div class="brand-sub">
                Образовательный сайт для учеников и родителей
            </div>
        </div>

        <button class="navbar-toggler text-white ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            ☰
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="nav">
            <ul class="navbar-nav chalk-text">
                <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('main.home') }}">Главная</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('main.info') }}">О себе</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#">Материалы</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="#">Контакты</a></li>
            </ul>
        </div>

    </div>
</nav>

<!-- CONTENT -->
<main class="container my-5">
    {% block content %}{% endblock %}
</main>

<!-- FOOTER -->
<footer class="chalkboard py-3">
    <div class="container text-center chalk-text">

        <p class="mb-1">📚 Материалы для учеников и родителей</p>
        <p class="mb-1">✉ fea3182@mail.com</p>

        <small>© 2026 Федосеева Е.А.</small>

    </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
